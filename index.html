<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Content Audit — Mitel Marketing Intelligence</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2315325f'/><rect x='5' y='7' width='5' height='18' rx='1.5' fill='%23FDB913'/><rect x='13.5' y='7' width='5' height='18' rx='1.5' fill='%23FDB913'/><rect x='22' y='7' width='5' height='18' rx='1.5' fill='%23FDB913'/></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f4f8; color: #333; }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeUp  { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up  { animation: fadeUp  0.35s ease forwards; }
    .slide-up { animation: slideUp 0.3s  ease forwards; }

    textarea, input[type=text] {
      background: #fff; border: 1.5px solid #dae1ea; border-radius: 8px;
      font-size: 13.5px; font-family: inherit; color: #333;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea:focus, input[type=text]:focus {
      outline: none; border-color: #0073d0; box-shadow: 0 0 0 3px rgba(0,115,208,0.12);
    }

    .p-card { cursor: pointer; border: 1.5px solid #dae1ea; border-radius: 10px; background: #fff; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; transition: border-color 0.15s, background 0.15s, box-shadow 0.15s; }
    .p-card:hover  { border-color: #0073d0; box-shadow: 0 2px 12px rgba(0,115,208,0.1); }
    .p-card.active { border-color: #0073d0; background: #eaf3fb; }

    /* Keyword pill — label not clickable, only × removes */
    .kw-pill {
      display: inline-flex; align-items: center; gap: 0;
      border-radius: 100px; font-size: 12px; font-weight: 600;
      margin: 3px; border: 1.5px solid;
      overflow: hidden;
    }
    .kw-pill-label { padding: 5px 10px 5px 12px; }
    .kw-pill-remove {
      padding: 5px 10px 5px 6px; cursor: pointer;
      display: flex; align-items: center; opacity: 0.7;
      transition: opacity 0.15s, background 0.15s;
      font-size: 14px; line-height: 1;
    }
    .kw-pill-remove:hover { opacity: 1; background: rgba(0,0,0,0.12); }

    /* AI suggestion pill — outlined, click to add */
    .kw-suggest {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 100px; font-size: 12px; font-weight: 600;
      margin: 3px; cursor: pointer; border: 1.5px dashed;
      transition: all 0.15s;
    }
    .kw-suggest:hover { filter: brightness(0.93); }

    .fix-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 10px; border-radius: 7px; cursor: pointer; transition: background 0.12s; margin: 2px 0; }
    .fix-row:hover   { background: #f5f8fc; }
    .fix-row.checked { background: #eaf3fb; }
    .fix-row input[type=checkbox] { margin-top: 3px; accent-color: #0073d0; width: 14px; height: 14px; flex-shrink: 0; cursor: pointer; }

    .btn-primary { border: none; border-radius: 8px; font-family: inherit; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: filter 0.15s, transform 0.1s; text-transform: uppercase; letter-spacing: 0.7px; }
    .btn-primary:not(:disabled):hover  { filter: brightness(0.93); }
    .btn-primary:not(:disabled):active { transform: scale(0.98); }
    .btn-primary:disabled { cursor: not-allowed; opacity: 0.4; }

    .btn-ghost { background: transparent; border: 1.5px solid; border-radius: 7px; font-family: inherit; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; transition: background 0.15s; }
    .btn-ghost:hover { background: rgba(255,255,255,0.14); }

    .regen-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: #15325f; border-top: 3px solid #FDB913; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 -4px 24px rgba(21,50,95,0.25); animation: slideUp 0.25s ease; }

    .score-bar { transition: width 1s cubic-bezier(.34,1.2,.64,1); }

    .copy-btn { background: none; border: 1px solid #dae1ea; font-family: inherit; font-size: 11px; font-weight: 600; cursor: pointer; padding: 4px 10px; border-radius: 5px; transition: background 0.15s; color: #0073d0; }
    .copy-btn:hover  { background: #eaf3fb; }
    .copy-btn.copied { color: #009688; border-color: #009688; }

    /* Impact badge */
    .impact-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 10.5px; font-weight: 700; padding: 2px 7px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const M = {
  darkNavy: "#15325f", navBlue: "#2E5C8A", midBlue: "#0073d0",
  yellow: "#FDB913", purple: "#812cc4", teal: "#009688",
  red: "#ec3831",
};

const CDN = "https://ubiquitous-cheesecake-ca38cc.netlify.app";
const ICONS = {
  tone:    `${CDN}/New%20Icons-Products-Solutions/Icon_Products_Solutions_BlueGradBg/Icon_Products_Solutions_BlueGradBg_Megaphone.svg`,
  seo:     `${CDN}/New%20Icons-Concepts/Icon_Concepts_BlueGradBg/Icon-Concepts_BlueGradBg_Insights.svg`,
  persona: `${CDN}/New%20Icons-Concepts/Icon_Concepts_BlueGradBg/Icon-Concepts_BlueGradBg_Customer%20Experience.svg`,
  cro:     `${CDN}/New%20Icons-Concepts/Icon_Concepts_BlueGradBg/Icon-Concepts_BlueGradBg_Action.svg`,
  ai:      `${CDN}/New%20Icons-Concepts/Icon_Concepts_BlueGradBg/Icon-Concepts_BlueGradBg_AI.svg`,
};

const DIMS = [
  { id: "tone",    label: "Tone & Brand",  desc: "Voice, clarity, Mitel standards",  color: M.midBlue,  bg: "#eaf3fb" },
  { id: "seo",     label: "SEO / AEO",     desc: "Search & AI engine visibility",     color: M.teal,     bg: "#e3f4f2" },
  { id: "persona", label: "Persona Fit",   desc: "Relevance to target audiences",     color: M.purple,   bg: "#f2eaf9" },
  { id: "cro",     label: "CRO Readiness", desc: "Conversion potential & CTAs",       color: "#9a6b00",  bg: "#fdf6e0" },
];

const PERSONAS = [
  { id: "it_dm",    label: "IT Decision Maker",       role: "CIO / IT Director",        pain: "reliability, security, vendor consolidation, reducing complexity" },
  { id: "biz_dm",   label: "Business Decision Maker", role: "CEO / CFO / COO",           pain: "employee productivity, cost control, business continuity, ROI" },
  { id: "it_admin", label: "IT Admin / Engineer",     role: "Systems administrator",     pain: "ease of management, uptime, integration, minimal maintenance" },
  { id: "end_user", label: "End User",                role: "Daily communications user", pain: "ease of use, call quality, mobile access, consistency" },
  { id: "partner",  label: "Channel Partner",         role: "Reseller / MSP / VAR",      pain: "margins, competitive positioning, customer retention" },
];

const getGrade = s => {
  if (s >= 90) return { letter: "A", color: M.teal,    label: "Excellent" };
  if (s >= 80) return { letter: "B", color: M.midBlue, label: "Good" };
  if (s >= 70) return { letter: "C", color: "#c49300", label: "Fair" };
  if (s >= 60) return { letter: "D", color: "#d4620a", label: "Needs work" };
  return         { letter: "F", color: M.red,     label: "Poor" };
};

const getImpactColor = v => {
  if (v >= 70) return { bg: "#fef3c7", color: "#92400e", border: "#fcd34d" };
  if (v >= 40) return { bg: "#dbeafe", color: "#1e40af", border: "#93c5fd" };
  return              { bg: "#f1f5f9", color: "#475569", border: "#cbd5e1" };
};

/* Safari-safe copy */
function copyText(text, setCopied) {
  const done = () => { setCopied(true); setTimeout(() => setCopied(false), 1800); };
  try {
    if (navigator.clipboard?.writeText) { navigator.clipboard.writeText(text).then(done).catch(fallback); }
    else { fallback(); }
  } catch { fallback(); }
  function fallback() {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.cssText = "position:fixed;opacity:0;top:0;left:0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta); done();
  }
}

/* ── Components ── */
const Spin = ({ dark, size = 16 }) => (
  <svg width={size} height={size} viewBox="0 0 16 16" fill="none"
    style={{ animation: "spin 0.75s linear infinite", flexShrink: 0 }}>
    <circle cx="8" cy="8" r="6" stroke={dark ? "#15325f" : "#fff"} strokeWidth="2.5"
      strokeDasharray="28" strokeDashoffset="10" strokeLinecap="round" opacity="0.5" />
  </svg>
);

const ScoreRing = ({ score, color, size = 70 }) => {
  const r = 28, circ = 2 * Math.PI * r;
  const offset = circ - (score / 100) * circ;
  return (
    <svg width={size} height={size} viewBox="0 0 70 70">
      <circle cx="35" cy="35" r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="6" />
      <circle cx="35" cy="35" r={r} fill="none" stroke={color} strokeWidth="6"
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        transform="rotate(-90 35 35)"
        style={{ transition: "stroke-dashoffset 1s cubic-bezier(.34,1.2,.64,1)" }} />
      <text x="35" y="40" textAnchor="middle" fill={color} fontSize="14" fontWeight="700"
        fontFamily="Inter, system-ui">{Math.round(score)}</text>
    </svg>
  );
};

const CopyBtn = ({ text }) => {
  const [copied, setCopied] = useState(false);
  return (
    <button className={`copy-btn${copied ? " copied" : ""}`} onClick={() => copyText(text, setCopied)}>
      {copied ? "✓ Copied" : "Copy"}
    </button>
  );
};

const ImpactBadge = ({ value }) => {
  const c = getImpactColor(value);
  const label = value >= 70 ? "High impact" : value >= 40 ? "Medium" : "Low";
  return (
    <span className="impact-badge" style={{ background: c.bg, color: c.color, border: `1px solid ${c.border}` }}>
      ↑{value}% {label}
    </span>
  );
};

/* Score summary strip for comparison panel */
const ScoreStrip = ({ results, label, accent }) => {
  const grade = getGrade(results.overall_score);
  return (
    <div style={{ background: "#f8fafc", border: "1.5px solid #dae1ea", borderRadius: 10, padding: "14px 18px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: accent, textTransform: "uppercase", letterSpacing: "0.9px" }}>{label}</span>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
          <span style={{ fontSize: 26, fontWeight: 700, color: grade.color }}>{grade.letter}</span>
          <span style={{ fontSize: 17, fontWeight: 700, color: M.darkNavy }}>{Math.round(results.overall_score)}<span style={{ fontSize: 11, color: "#9aabb8", fontWeight: 400 }}>/100</span></span>
        </div>
      </div>
      {DIMS.map(d => {
        const dim = results.dimensions[d.id];
        if (!dim) return null;
        const col = d.id === "cro" ? "#9a6b00" : d.color;
        return (
          <div key={d.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "5px 0", borderTop: "1px solid #f0f4f8" }}>
            <img src={ICONS[d.id]} alt="" width={18} height={18} />
            <span style={{ fontSize: 12, color: "#555", flex: 1 }}>{d.label}</span>
            <div style={{ width: 72, height: 4, background: "#edf2f7", borderRadius: 2, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${Math.round(dim.score)}%`, background: col, borderRadius: 2, transition: "width 1s ease" }} />
            </div>
            <span style={{ fontSize: 12.5, fontWeight: 700, color: col, minWidth: 24, textAlign: "right" }}>{Math.round(dim.score)}</span>
          </div>
        );
      })}
    </div>
  );
};

const ScoreDelta = ({ before, after }) => {
  const delta = Math.round(after - before);
  if (delta === 0) return <span style={{ fontSize: 11, color: "#9aabb8" }}>no change</span>;
  const pos = delta > 0;
  return (
    <span style={{ fontSize: 12, fontWeight: 700, color: pos ? M.teal : M.red, background: pos ? "#e3f4f2" : "#fff5f5", border: `1px solid ${pos ? M.teal : M.red}`, padding: "2px 9px", borderRadius: 20 }}>
      {pos ? "+" : ""}{delta}
    </span>
  );
};

/* Normalize fixes — server now returns [{text, impact}] but handle old [{string}] too */
const getFixes = dim => (dim?.fixes || []).map(f => typeof f === "string" ? { text: f, impact: 50 } : f);

/* ── API helper ── */
async function post(endpoint, body) {
  const r = await fetch(endpoint, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const d = await r.json();
  if (d.error) throw new Error(typeof d.error === "string" ? d.error : JSON.stringify(d.error));
  return d.text;
}

/* ══════════════════════════════════════════════════════════════════════════ */
function App() {
  const [content,          setContent]          = useState("");
  const [selectedPersonas, setSelectedPersonas] = useState([]);
  const [kwInput,          setKwInput]          = useState("");
  const [activeKws,        setActiveKws]        = useState([]);
  const [suggestedKwSet,   setSuggestedKwSet]   = useState(new Set());
  const [pendingSuggests,  setPendingSuggests]  = useState([]); // shown below input, click to add
  const [kwLoading,        setKwLoading]        = useState(false);

  const [view,             setView]             = useState("form");
  const [results,          setResults]          = useState(null);
  const [error,            setError]            = useState(null);

  const [checkedFixes,     setCheckedFixes]     = useState({});
  const [regenLoading,     setRegenLoading]     = useState(false);
  const [improvedText,     setImprovedText]     = useState("");
  const [improvedResults,  setImprovedResults]  = useState(null);
  const [retestLoading,    setRetestLoading]    = useState(false);

  const togglePersona = id => setSelectedPersonas(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

  const removeKw = kw => {
    setActiveKws(prev => prev.filter(k => k !== kw));
    setSuggestedKwSet(prev => { const s = new Set(prev); s.delete(kw); return s; });
  };

  const addManualKws = () => {
    const kws = kwInput.split(",").map(k => k.trim()).filter(Boolean);
    if (!kws.length) return;
    setActiveKws(prev => [...new Set([...prev, ...kws])]);
    setKwInput("");
  };

  /* Add a pending suggestion to active list */
  const addSuggestion = kw => {
    setActiveKws(prev => [...new Set([...prev, kw])]);
    setSuggestedKwSet(prev => { const s = new Set(prev); s.add(kw); return s; });
    setPendingSuggests(prev => prev.filter(k => k !== kw));
  };

  /* Add all pending suggestions at once */
  const addAllSuggestions = () => {
    setActiveKws(prev => [...new Set([...prev, ...pendingSuggests])]);
    setSuggestedKwSet(prev => { const s = new Set(prev); pendingSuggests.forEach(k => s.add(k)); return s; });
    setPendingSuggests([]);
  };

  const suggestKeywords = async () => {
    if (!content.trim()) return;
    setKwLoading(true); setError(null); setPendingSuggests([]);
    try {
      const text = await post("/api/keywords", { content, existing: activeKws });
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      // Show as pending — user explicitly clicks to add each one
      setPendingSuggests(parsed.filter(k => !activeKws.includes(k)));
    } catch { setError("Keyword suggestion failed — please try again."); }
    finally { setKwLoading(false); }
  };

  const analyze = async (contentToUse = content) => {
    if (contentToUse.trim().length < 80) { setError("Paste at least 80 characters of content."); return; }
    if (selectedPersonas.length === 0) { setError("Select at least one persona."); return; }
    setError(null); setView("loading");
    try {
      const personas = selectedPersonas.map(id => PERSONAS.find(p => p.id === id));
      const text = await post("/api/analyze", { content: contentToUse, personas, keywords: activeKws });
      setResults(JSON.parse(text.replace(/```json|```/g, "").trim()));
      setImprovedText(""); setImprovedResults(null); setCheckedFixes({});
      setView("results");
    } catch (e) {
      setError(e.message || "Analysis failed — please try again.");
      setView("form");
    }
  };

  const regenerate = async () => {
    const fixes = Object.entries(checkedFixes).filter(([, v]) => v).map(([k]) => k);
    if (!fixes.length) return;
    setRegenLoading(true); setImprovedText(""); setImprovedResults(null); setError(null);
    try {
      const personas = selectedPersonas.map(id => PERSONAS.find(p => p.id === id));
      const text = await post("/api/regenerate", { content, fixes, keywords: activeKws, personas });
      const rewritten = text.trim();
      setImprovedText(rewritten);
      setRetestLoading(true);
      try {
        const scoreText = await post("/api/analyze", { content: rewritten, personas, keywords: activeKws });
        setImprovedResults(JSON.parse(scoreText.replace(/```json|```/g, "").trim()));
      } catch { }
      finally { setRetestLoading(false); }
    } catch (e) { setError(e.message || "Regeneration failed."); }
    finally { setRegenLoading(false); }
  };

  const retestImproved = async () => {
    if (!improvedText.trim()) return;
    setRetestLoading(true); setImprovedResults(null); setError(null);
    try {
      const personas = selectedPersonas.map(id => PERSONAS.find(p => p.id === id));
      const text = await post("/api/analyze", { content: improvedText, personas, keywords: activeKws });
      setImprovedResults(JSON.parse(text.replace(/```json|```/g, "").trim()));
    } catch (e) { setError(e.message || "Re-test failed."); }
    finally { setRetestLoading(false); }
  };

  const goBack = () => {
    setView("form"); setResults(null); setImprovedText(""); setImprovedResults(null);
    setCheckedFixes({}); setError(null);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const fullReset = () => {
    goBack(); setContent(""); setActiveKws([]); setSuggestedKwSet(new Set());
    setKwInput(""); setSelectedPersonas([]); setPendingSuggests([]);
  };

  const allFixes = results
    ? DIMS.flatMap(d => getFixes(results.dimensions[d.id]).map(f => ({ fix: f.text, impact: f.impact, dim: d })))
    : [];
  const selectedFixCount = Object.values(checkedFixes).filter(Boolean).length;
  const canRun = content.trim().length >= 80 && selectedPersonas.length > 0;

  const card = { background: "#fff", border: "1.5px solid #dae1ea", borderRadius: 12, padding: "24px 26px", marginBottom: 18, boxShadow: "0 2px 12px rgba(21,50,95,0.06)" };
  const sectionLabel = { fontSize: 11, fontWeight: 700, color: M.navBlue, textTransform: "uppercase", letterSpacing: "0.9px", display: "block", marginBottom: 10 };

  return (
    <div style={{ minHeight: "100vh", background: "#f0f4f8", paddingBottom: selectedFixCount > 0 && view === "results" ? 84 : 0 }}>

      {/* Utility bar */}
      <div style={{ background: M.darkNavy, height: 34, padding: "0 32px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontSize: 11.5, color: "rgba(255,255,255,0.5)" }}>Mitel Marketing Intelligence</span>
        <span style={{ fontSize: 10.5, fontWeight: 700, color: M.yellow, textTransform: "uppercase", letterSpacing: "1px" }}>Beta · Internal Use Only</span>
      </div>

      {/* Nav */}
      <nav style={{ background: M.navBlue, borderBottom: `3px solid ${M.yellow}`, padding: "0 32px", height: 64, display: "flex", alignItems: "center" }}>
        <div style={{ paddingRight: 24, borderRight: "1px solid rgba(255,255,255,0.18)", marginRight: 24 }}>
          <img src="https://s29.q4cdn.com/947791400/files/images/logos/Mitel-LogoTag-WhtBlue-RGB.png"
            alt="Mitel" height="44" style={{ display: "block" }} />
        </div>
        <div>
          <p style={{ margin: 0, fontSize: 14.5, fontWeight: 600, color: "#fff", lineHeight: 1.15 }}>Content Audit Dashboard</p>
          <p style={{ margin: 0, fontSize: 11, color: "rgba(255,255,255,0.5)", display: "flex", alignItems: "center", gap: 5 }}>
            <img src={ICONS.ai} alt="" width={12} height={12} style={{ opacity: 0.75 }} />
            Powered by Claude AI
          </p>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 10 }}>
          {view === "results" && (
            <button onClick={goBack} className="btn-ghost"
              style={{ color: "#fff", borderColor: "rgba(255,255,255,0.35)", fontSize: 12, padding: "7px 15px" }}>
              ← Edit content
            </button>
          )}
          {view === "results" && (
            <button onClick={fullReset} className="btn-ghost"
              style={{ color: "rgba(255,255,255,0.6)", borderColor: "rgba(255,255,255,0.2)", fontSize: 12, padding: "7px 15px" }}>
              New audit
            </button>
          )}
        </div>
      </nav>

      {/* Hero */}
      {view === "form" && (
        <div style={{ background: `linear-gradient(135deg, ${M.darkNavy} 0%, #1b3f6e 50%, #2c1a50 100%)`, padding: "46px 32px 50px", textAlign: "center" }}>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "rgba(253,185,19,0.15)", border: "1px solid rgba(253,185,19,0.3)", borderRadius: 100, padding: "5px 14px", marginBottom: 18 }}>
            <img src={ICONS.ai} alt="" width={13} height={13} />
            <span style={{ fontSize: 11.5, fontWeight: 600, color: M.yellow, letterSpacing: "0.6px", textTransform: "uppercase" }}>AI-Powered Analysis</span>
          </div>
          <h1 style={{ fontSize: 34, fontWeight: 700, color: "#fff", lineHeight: 1.2, marginBottom: 12, letterSpacing: "-0.5px" }}>
            Score your content<br /><span style={{ color: M.yellow }}>before it goes live</span>
          </h1>
          <p style={{ fontSize: 15.5, color: "rgba(255,255,255,0.55)", maxWidth: 460, margin: "0 auto 30px", lineHeight: 1.6, fontWeight: 300 }}>
            Audit any marketing copy across Tone, SEO/AEO, Persona Fit and CRO Readiness in seconds.
          </p>
          <div style={{ display: "flex", justifyContent: "center", gap: 36 }}>
            {DIMS.map(d => (
              <div key={d.id} style={{ textAlign: "center" }}>
                <img src={ICONS[d.id]} alt={d.label} width={48} height={48} style={{ display: "block", margin: "0 auto 8px", opacity: 0.88 }} />
                <p style={{ fontSize: 10.5, fontWeight: 600, color: "rgba(255,255,255,0.5)", textTransform: "uppercase", letterSpacing: "0.5px" }}>{d.label}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ maxWidth: 940, margin: "0 auto", padding: "30px 28px 60px" }}>

        {/* ══ FORM ══ */}
        {view === "form" && (
          <div className="fade-up">

            {/* Content */}
            <div style={card}>
              <label style={sectionLabel}>Content to audit</label>
              <textarea style={{ width: "100%", minHeight: 155, padding: "13px 15px", fontSize: 14, lineHeight: 1.7, resize: "vertical" }}
                placeholder="Paste your web page copy, email, blog post, or any marketing content here…"
                value={content} onChange={e => setContent(e.target.value)} />
              {content.length > 0 && (
                <p style={{ fontSize: 11, color: content.length < 80 ? M.red : "#9aabb8", marginTop: 6, textAlign: "right" }}>
                  {content.length} chars {content.length < 80 ? `— need ${80 - content.length} more` : "✓"}
                </p>
              )}
            </div>

            {/* Personas */}
            <div style={card}>
              <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 14 }}>
                <label style={{ ...sectionLabel, marginBottom: 0 }}>Target personas</label>
                <span style={{ fontSize: 12, color: "#9aabb8" }}>Select all that apply</span>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {PERSONAS.map(p => {
                  const on = selectedPersonas.includes(p.id);
                  return (
                    <div key={p.id} className={`p-card${on ? " active" : ""}`} onClick={() => togglePersona(p.id)}>
                      <div style={{ width: 18, height: 18, borderRadius: 5, border: `2px solid ${on ? M.midBlue : "#c8d4de"}`, background: on ? M.midBlue : "#fff", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", marginTop: 1, transition: "all 0.15s" }}>
                        {on && <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.8 7L9 1" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      </div>
                      <div>
                        <p style={{ margin: 0, fontSize: 13.5, fontWeight: 600, color: on ? M.midBlue : M.darkNavy }}>{p.label}</p>
                        <p style={{ margin: "2px 0 0", fontSize: 12, color: "#7a8ea0" }}>{p.role}</p>
                      </div>
                    </div>
                  );
                })}
              </div>
              {selectedPersonas.length > 1 && (
                <div style={{ marginTop: 12, padding: "8px 14px", background: "#eaf3fb", borderRadius: 8, fontSize: 12.5, color: M.midBlue, fontWeight: 500 }}>
                  Scoring across {selectedPersonas.length} personas — audit will highlight gaps between them
                </div>
              )}
            </div>

            {/* Keywords */}
            <div style={card}>
              <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 12 }}>
                <label style={{ ...sectionLabel, marginBottom: 0 }}>Focus keywords</label>
                <span style={{ fontSize: 12, color: "#9aabb8" }}>Enter yours or let AI suggest</span>
              </div>

              <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                <input type="text" style={{ flex: 1, padding: "10px 13px" }}
                  placeholder="unified communications, cloud phone system…"
                  value={kwInput} onChange={e => setKwInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addManualKws()} />
                <button onClick={addManualKws} disabled={!kwInput.trim()}
                  style={{ padding: "10px 18px", background: M.midBlue, color: "#fff", fontSize: 13, fontWeight: 600, border: "none", borderRadius: 8, cursor: kwInput.trim() ? "pointer" : "not-allowed", opacity: kwInput.trim() ? 1 : 0.4, fontFamily: "inherit" }}>
                  Add
                </button>
                <button onClick={suggestKeywords} disabled={kwLoading || !content.trim()}
                  style={{ padding: "10px 18px", background: M.teal, color: "#fff", fontSize: 13, fontWeight: 600, border: "none", borderRadius: 8, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 7, whiteSpace: "nowrap", opacity: content.trim() ? 1 : 0.4 }}>
                  {kwLoading ? <><Spin size={14} />Suggesting…</> : <><img src={ICONS.ai} alt="" width={15} height={15} />AI Suggest</>}
                </button>
              </div>

              {/* Active keywords — solid pills, × to remove */}
              {activeKws.length > 0 && (
                <div style={{ marginBottom: pendingSuggests.length > 0 ? 14 : 0 }}>
                  <p style={{ fontSize: 11, fontWeight: 600, color: "#8898a8", textTransform: "uppercase", letterSpacing: "0.6px", marginBottom: 8 }}>
                    {activeKws.length} keyword{activeKws.length > 1 ? "s" : ""} active
                  </p>
                  <div>
                    {activeKws.map(kw => {
                      const isSugg = suggestedKwSet.has(kw);
                      const bg = isSugg ? M.teal : M.midBlue;
                      return (
                        <span key={kw} className="kw-pill" style={{ background: bg, color: "#fff", borderColor: bg }}>
                          <span className="kw-pill-label">{isSugg && <span style={{ fontSize: 10, marginRight: 3 }}>✦</span>}{kw}</span>
                          <span className="kw-pill-remove" onClick={() => removeKw(kw)} title="Remove keyword">×</span>
                        </span>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Pending AI suggestions — dashed outline, click to add */}
              {pendingSuggests.length > 0 && (
                <div style={{ borderTop: activeKws.length > 0 ? "1px solid #edf2f7" : "none", paddingTop: activeKws.length > 0 ? 14 : 0 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                    <p style={{ fontSize: 11, fontWeight: 600, color: M.teal, textTransform: "uppercase", letterSpacing: "0.6px" }}>
                      ✦ AI suggestions — click to add
                    </p>
                    <button onClick={addAllSuggestions}
                      style={{ fontSize: 11.5, fontWeight: 600, color: M.teal, background: "#e3f4f2", border: `1px solid ${M.teal}`, borderRadius: 6, padding: "3px 10px", cursor: "pointer", fontFamily: "inherit" }}>
                      Add all
                    </button>
                  </div>
                  <div>
                    {pendingSuggests.map(kw => (
                      <span key={kw} className="kw-suggest" onClick={() => addSuggestion(kw)}
                        style={{ color: M.teal, borderColor: M.teal, background: "#f0fdf9" }}>
                        <span style={{ fontSize: 11 }}>+</span> {kw}
                      </span>
                    ))}
                  </div>
                  <p style={{ marginTop: 8, fontSize: 11.5, color: "#9aabb8" }}>
                    Click a keyword to add it · <span style={{ color: M.teal, fontWeight: 600 }}>✦ Teal solid</span> = added AI suggestions · <span style={{ color: M.midBlue, fontWeight: 600 }}>Blue solid</span> = added by you
                  </p>
                </div>
              )}

              {activeKws.length === 0 && pendingSuggests.length === 0 && (
                <p style={{ fontSize: 12, color: "#b0bcca", fontStyle: "italic" }}>No keywords added yet — type above or click AI Suggest</p>
              )}
            </div>

            <button onClick={() => analyze()} disabled={!canRun} className="btn-primary"
              style={{ width: "100%", padding: 15, fontSize: 14, background: canRun ? M.yellow : "#f5d980", color: "#000" }}>
              Analyze Content →
            </button>
            {!canRun && (
              <p style={{ textAlign: "center", fontSize: 12, color: "#9aabb8", marginTop: 8 }}>
                {content.length < 80 ? "Paste your content above" : "Select at least one persona"} to run the audit
              </p>
            )}
          </div>
        )}

        {/* ══ LOADING ══ */}
        {view === "loading" && (
          <div className="fade-up" style={{ ...card, textAlign: "center", padding: "72px 32px" }}>
            <img src={ICONS.ai} alt="" width={52} height={52} style={{ animation: "spin 3s linear infinite", display: "block", margin: "0 auto 18px" }} />
            <p style={{ fontSize: 18, fontWeight: 600, color: M.darkNavy, marginBottom: 8 }}>Analyzing your content…</p>
            <p style={{ fontSize: 13.5, color: "#8898a8" }}>
              Scoring across {selectedPersonas.length} persona{selectedPersonas.length > 1 ? "s" : ""}
              {activeKws.length > 0 ? `, ${activeKws.length} keyword${activeKws.length > 1 ? "s" : ""}` : ""} and 4 dimensions
            </p>
          </div>
        )}

        {/* ══ RESULTS ══ */}
        {view === "results" && results && (() => {
          const grade = getGrade(results.overall_score);
          return (
            <div className="fade-up">

              {/* Score banner */}
              <div style={{ background: `linear-gradient(135deg, ${M.darkNavy} 0%, #1b3f6e 50%, #2c1a50 100%)`, borderRadius: 14, padding: "28px 32px", marginBottom: 18, boxShadow: "0 6px 28px rgba(21,50,95,0.22)" }}>
                <p style={{ margin: "0 0 14px", fontSize: 11, fontWeight: 700, color: M.yellow, textTransform: "uppercase", letterSpacing: "1.2px" }}>Audit Result</p>
                <div style={{ display: "flex", alignItems: "center", gap: 28, flexWrap: "wrap" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 18 }}>
                    <div>
                      <div style={{ fontSize: 66, fontWeight: 700, color: grade.color, lineHeight: 1 }}>{grade.letter}</div>
                      <div style={{ fontSize: 11.5, fontWeight: 600, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>{grade.label}</div>
                    </div>
                    <div>
                      <div style={{ fontSize: 34, fontWeight: 700, color: "#fff", lineHeight: 1 }}>
                        {Math.round(results.overall_score)}<span style={{ fontSize: 16, color: "rgba(255,255,255,0.35)", fontWeight: 400 }}>/100</span>
                      </div>
                      <div style={{ fontSize: 12, color: "rgba(255,255,255,0.45)", marginTop: 6 }}>
                        {selectedPersonas.map(id => PERSONAS.find(p => p.id === id)?.label).join(" · ")}
                      </div>
                    </div>
                  </div>

                  {activeKws.length > 0 && (
                    <div style={{ borderLeft: "1px solid rgba(255,255,255,0.12)", paddingLeft: 24 }}>
                      <p style={{ margin: "0 0 7px", fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "0.8px" }}>Scored against</p>
                      <div>
                        {activeKws.map(kw => (
                          <span key={kw} style={{ display: "inline-block", background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 100, padding: "3px 11px", fontSize: 12, color: "#fff", margin: "2px 3px", fontWeight: 500 }}>{kw}</span>
                        ))}
                      </div>
                    </div>
                  )}

                  <div style={{ marginLeft: "auto", display: "flex", gap: 20, flexWrap: "wrap" }}>
                    {DIMS.map(d => (
                      <div key={d.id} style={{ textAlign: "center" }}>
                        <ScoreRing score={results.dimensions[d.id]?.score ?? 0} color={d.id === "cro" ? M.yellow : d.color} />
                        <div style={{ fontSize: 9.5, color: "rgba(255,255,255,0.38)", textTransform: "uppercase", letterSpacing: "0.5px", marginTop: 4 }}>{d.label}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Dimension cards */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 18 }}>
                {DIMS.map(d => {
                  const dim = results.dimensions[d.id];
                  if (!dim) return null;
                  const col = d.id === "cro" ? "#9a6b00" : d.color;
                  const fixes = getFixes(dim);
                  const dimCheckedCount = fixes.filter(f => checkedFixes[f.text]).length;
                  return (
                    <div key={d.id} style={{ background: "#fff", border: "1.5px solid #dae1ea", borderRadius: 12, overflow: "hidden", boxShadow: "0 2px 10px rgba(21,50,95,0.05)" }}>
                      <div style={{ background: d.bg, padding: "16px 20px", borderBottom: `2px solid ${col}22`, display: "flex", alignItems: "center", gap: 12 }}>
                        <img src={ICONS[d.id]} alt="" width={46} height={46} />
                        <div style={{ flex: 1 }}>
                          <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                            <span style={{ fontSize: 15, fontWeight: 700, color: M.darkNavy }}>{d.label}</span>
                            <span style={{ fontSize: 22, fontWeight: 700, color: col, lineHeight: 1 }}>{Math.round(dim.score)}</span>
                          </div>
                          <p style={{ margin: "2px 0 0", fontSize: 12, color: "#7a8ea0" }}>{dim.summary}</p>
                        </div>
                      </div>
                      <div style={{ padding: "16px 20px" }}>
                        <div style={{ height: 5, background: "#edf2f7", borderRadius: 3, marginBottom: 14, overflow: "hidden" }}>
                          <div className="score-bar" style={{ height: "100%", width: `${Math.round(dim.score)}%`, background: `linear-gradient(90deg, ${col}88, ${col})`, borderRadius: 3 }} />
                        </div>

                        {d.id === "persona" && dim.persona_breakdown?.length > 0 && (
                          <div style={{ background: "#f8fafc", borderRadius: 8, padding: "11px 13px", marginBottom: 14 }}>
                            <p style={{ margin: "0 0 9px", fontSize: 10.5, fontWeight: 700, color: M.navBlue, textTransform: "uppercase", letterSpacing: "0.7px" }}>Per-persona alignment</p>
                            {dim.persona_breakdown.map((pb, i) => {
                              const bc = pb.alignment >= 70 ? M.teal : pb.alignment >= 50 ? "#c49300" : M.red;
                              return (
                                <div key={i} style={{ marginBottom: i < dim.persona_breakdown.length - 1 ? 9 : 0 }}>
                                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                                    <span style={{ fontSize: 12.5, fontWeight: 600, color: M.darkNavy }}>{pb.name}</span>
                                    <span style={{ fontSize: 12.5, fontWeight: 700, color: bc }}>{pb.alignment}%</span>
                                  </div>
                                  <div style={{ height: 4, background: "#e2e8f0", borderRadius: 2, overflow: "hidden", marginBottom: 2 }}>
                                    <div style={{ height: "100%", width: `${pb.alignment}%`, background: bc, borderRadius: 2, transition: "width 0.9s ease" }} />
                                  </div>
                                  {pb.gap && <p style={{ margin: 0, fontSize: 11, color: "#9aabb8" }}>Gap: {pb.gap}</p>}
                                </div>
                              );
                            })}
                          </div>
                        )}

                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
                          <p style={{ margin: 0, fontSize: 10.5, fontWeight: 700, color: M.navBlue, textTransform: "uppercase", letterSpacing: "0.8px" }}>Fixes — select to apply</p>
                          {dimCheckedCount > 0 && (
                            <span style={{ fontSize: 11, fontWeight: 600, color: M.midBlue, background: "#eaf3fb", borderRadius: 20, padding: "2px 8px" }}>{dimCheckedCount} selected</span>
                          )}
                        </div>
                        {fixes.map((f, i) => {
                          const isChecked = !!checkedFixes[f.text];
                          return (
                            <label key={i} className={`fix-row${isChecked ? " checked" : ""}`}>
                              <input type="checkbox" checked={isChecked}
                                onChange={e => setCheckedFixes(prev => ({ ...prev, [f.text]: e.target.checked }))} />
                              <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 4 }}>
                                <span style={{ fontSize: 13, color: isChecked ? M.midBlue : "#444", lineHeight: 1.5, fontWeight: isChecked ? 500 : 400 }}>{f.text}</span>
                                <ImpactBadge value={f.impact} />
                              </div>
                            </label>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Improved content panel */}
              {(regenLoading || improvedText) && (
                <div style={{ ...card }} className="fade-up">
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                    <img src={ICONS.ai} alt="" width={26} height={26} />
                    <span style={{ fontSize: 15, fontWeight: 700, color: M.darkNavy }}>Improved version</span>
                    {retestLoading && (
                      <span style={{ fontSize: 12, color: "#8898a8", display: "flex", alignItems: "center", gap: 6, marginLeft: 6 }}>
                        <Spin dark size={13} />Scoring…
                      </span>
                    )}
                  </div>

                  {regenLoading && (
                    <div style={{ textAlign: "center", padding: "28px 0", display: "flex", flexDirection: "column", alignItems: "center", gap: 10, color: "#8898a8" }}>
                      <Spin dark size={22} />
                      <span style={{ fontSize: 13.5 }}>Rewriting your content…</span>
                    </div>
                  )}

                  {improvedText && (
                    <div style={{ display: "grid", gridTemplateColumns: improvedResults ? "1fr 1fr" : "1fr", gap: 18 }}>

                      {/* Editor — plain white, looks like a real text editor */}
                      <div>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                          <span style={{ fontSize: 11, fontWeight: 700, color: M.navBlue, textTransform: "uppercase", letterSpacing: "0.8px" }}>Edit & refine</span>
                          <div style={{ display: "flex", gap: 8 }}>
                            <CopyBtn text={improvedText} />
                            <button onClick={retestImproved} disabled={retestLoading}
                              style={{ padding: "5px 13px", background: retestLoading ? "#b0c4d8" : M.midBlue, color: "#fff", border: "none", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 5, textTransform: "uppercase", letterSpacing: "0.5px" }}>
                              {retestLoading ? <><Spin size={11} />Testing…</> : "Re-test →"}
                            </button>
                          </div>
                        </div>
                        {/* Plain white editor — no green background */}
                        <textarea
                          style={{ width: "100%", minHeight: 420, height: "100%", padding: "14px 16px", fontSize: 13.5, lineHeight: 1.75, resize: "vertical", background: "#fff", border: "1.5px solid #dae1ea", borderRadius: 8, color: "#333", fontFamily: "inherit" }}
                          value={improvedText} onChange={e => setImprovedText(e.target.value)} />
                        <p style={{ fontSize: 11.5, color: "#9aabb8", marginTop: 6 }}>Edit above, then click Re-test to score your changes</p>
                      </div>

                      {/* Score comparison */}
                      {improvedResults && (
                        <div>
                          <div style={{ marginBottom: 10 }}>
                            <ScoreStrip results={results} label="Original score" accent="#9aabb8" />
                          </div>
                          <div style={{ marginBottom: 10 }}>
                            <ScoreStrip results={improvedResults} label="Improved score" accent={M.teal} />
                          </div>
                          <div style={{ background: "#eaf3fb", border: "1.5px solid #b8d4ee", borderRadius: 10, padding: "12px 16px" }}>
                            <p style={{ margin: "0 0 8px", fontSize: 10.5, fontWeight: 700, color: M.navBlue, textTransform: "uppercase", letterSpacing: "0.7px" }}>Score changes</p>
                            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                <span style={{ fontSize: 13, fontWeight: 600, color: M.darkNavy }}>Overall</span>
                                <ScoreDelta before={results.overall_score} after={improvedResults.overall_score} />
                              </div>
                              {DIMS.map(d => (
                                <div key={d.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                  <span style={{ fontSize: 12.5, color: "#555" }}>{d.label}</span>
                                  <ScoreDelta before={results.dimensions[d.id]?.score ?? 0} after={improvedResults.dimensions[d.id]?.score ?? 0} />
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              <p style={{ marginTop: 16, textAlign: "center", fontSize: 11.5, color: "#b0bcca" }}>
                Scores generated by Claude AI · Mitel Marketing Intelligence Beta · Internal use only
              </p>
            </div>
          );
        })()}

        {/* Error */}
        {error && (
          <div style={{ background: "#fff5f5", border: "1.5px solid #fca5a5", borderRadius: 10, padding: "12px 16px", fontSize: 13.5, color: M.red, marginTop: 14, display: "flex", gap: 10, alignItems: "center" }}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke={M.red} strokeWidth="1.5"/><path d="M8 5v3.5M8 10.5v.1" stroke={M.red} strokeWidth="1.5" strokeLinecap="round"/></svg>
            {error}
          </div>
        )}
      </div>

      {/* Sticky regen bar */}
      {selectedFixCount > 0 && view === "results" && (
        <div className="regen-bar">
          <div>
            <p style={{ margin: 0, fontSize: 13.5, fontWeight: 600, color: "#fff" }}>
              {selectedFixCount} fix{selectedFixCount > 1 ? "es" : ""} selected
            </p>
            <p style={{ margin: 0, fontSize: 12, color: "rgba(255,255,255,0.5)" }}>
              Claude will rewrite and immediately score the improved version
            </p>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => setCheckedFixes({})}
              style={{ background: "transparent", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 7, color: "rgba(255,255,255,0.6)", fontSize: 12, fontWeight: 600, padding: "8px 14px", cursor: "pointer", fontFamily: "inherit" }}>
              Clear
            </button>
            <button onClick={regenerate} disabled={regenLoading} className="btn-primary"
              style={{ padding: "10px 24px", background: regenLoading ? "#c49300" : M.yellow, color: "#000", fontSize: 13 }}>
              {regenLoading ? <><Spin dark size={14} />Regenerating…</> : "Regenerate content →"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
